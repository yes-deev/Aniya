name: Android API 34 (KVM) + Cloudflare Web VNC

on:
  workflow_dispatch:

jobs:
  interactive-emulator:
    runs-on: ubuntu-latest # x86_64 host with /dev/kvm acceleration
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configure KVM Permission Group
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display, Audio, and Tunneling Packages
        run: |
          sudo apt-get update
          # ADDED: libpulse0 to prevent the QEMU shared library crash
          sudo apt-get install -y xvfb x11vnc novnc websockify jq libpulse0
          
          # Download and deploy the official cloudflared binary
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Initialize Web VNC Proxy Backend
        run: |
          Xvfb :1 -screen 0 720x1280x24 &
          sleep 2
          x11vnc -display :1 -nopw -listen 127.0.0.1 -forever -shared &
          sleep 2
          websockify --web=/usr/share/novnc 6080 127.0.0.1:5900 &
          sleep 2

      - name: Boot Android API 34 Emulator & Tunnel Stream
        env:
          DISPLAY: ":1" 
        run: |
          # 1. Start the Cloudflare Tunnel
          cloudflared tunnel --url http://localhost:6080 > cloudflare.log 2>&1 &
          sleep 5
          
          echo "=========================================================="
          echo "🌐 CLOUDFLARE TUNNEL IS LIVE!"
          echo "=========================================================="
          grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log | head -n 1
          echo "=========================================================="

          # 2. Add tools to PATH and FORCE all Android directories
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          export ANDROID_USER_HOME="$HOME/.android"
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"

          # 3. Accept Licenses & Install Image
          echo "Accepting SDK Licenses..."
          yes | sdkmanager --licenses > /dev/null
          
          echo "Installing system image..."
          sdkmanager "system-images;android-34;google_apis;x86_64"
          
          # 4. Create AVD
          echo "Creating Virtual Device..."
          avdmanager create avd -n test_device -k "system-images;android-34;google_apis;x86_64" -d pixel --force
          
          # 5. OVERRIDE HARDWARE SPECS
          echo "hw.ramSize=4096MB" >> "$ANDROID_AVD_HOME/test_device.avd/config.ini"
          echo "hw.cpu.ncore=4" >> "$ANDROID_AVD_HOME/test_device.avd/config.ini"

          # 6. Launch Emulator
          echo "Launching Emulator..."
          emulator -avd test_device -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -memory 4096 -cores 4 &
          
          # 7. Wait for ADB execution layers to initialize
          adb wait-for-device
          echo "Android environment fully reachable via automated interfaces!"

          # Keep the session open for 1 hour
          sleep 1h
          
