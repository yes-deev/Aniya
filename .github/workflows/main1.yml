name: Android API 34 (KVM) + Cloudflare Web VNC

on:
  workflow_dispatch:

jobs:
  interactive-emulator:
    runs-on: ubuntu-latest # x86_64 host with /dev/kvm
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configure KVM Permission Group
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Tunneling Packages
        run: |
          sudo apt-get update
          # Install headless display framebuffers, VNC servers, and Web UI dependencies
          sudo apt-get install -y xvfb x11vnc novnc websockify jq
          
          # Download and deploy the official cloudflared binary
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Initialize Web VNC Proxy Backend
        run: |
          # 1. Boot up a hidden virtual display screen (Xvfb) matching standard phone dimensions
          Xvfb :1 -screen 0 720x1280x24 &
          sleep 2
          
          # 2. Bind a VNC server onto that virtual display instance (No password set for simplicity)
          x11vnc -display :1 -nopw -listen 127.0.0.1 -forever -shared &
          sleep 2
          
          # 3. Use websockify to convert VNC raw streams into an HTTP Web UI portal over port 6080
          websockify --web=/usr/share/novnc 6080 127.0.0.1:5900 &
          sleep 2

      - name: Boot Android API 34 Emulator & Tunnel Stream
        env:
          DISPLAY: ":1" # Forces the emulator to draw its screen inside our Xvfb frame buffer
        run: |
          # 1. Start the Cloudflare Tunnel pointing to our Web VNC interface
          # --url http://localhost:6080 grabs the stream and sends it to Cloudflare edge networks
          cloudflared tunnel --url http://localhost:6080 > cloudflare.log 2>&1 &
          
          # 2. Give the tunnel daemon a split second to print out its auto-assigned domain string
          sleep 5
          
          echo "=========================================================="
          echo "🌐 CLOUDFLARE TUNNEL IS LIVE!"
          echo "=========================================================="
          # Extract the unique .trycloudflare.com hostname generated dynamically for this run
          grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log | head -n 1
          echo "=========================================================="

          # 3. Boot up the Android API 34 system
          # Note: We omit '-no-window' because we WANT it to render into our virtual display buffer
          echo "Starting SDK Emulator partition..."
          sdkmanager --install "system-images;android-34;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_device -k "system-images;android-34;google_apis;x86_64" --force
          
          $ANDROID_HOME/emulator/emulator -avd test_device -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none &
          
          # 4. Wait for ADB execution layers to initialize
          adb wait-for-device
          echo "Android environment fully reachable via automated interfaces!"

          # Keep the session open for 1 hour so you can click around and manually pilot/test it
          sleep 1h
          
